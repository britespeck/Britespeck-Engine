name: Deploy to Amazon ECR

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    name: Build and Push
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-2

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, Tag, and Push Image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: britespeck-engine
        IMAGE_TAG: latest
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
Use code with caution.

2. Save and Push
Save the file (Cmd + S).
Go to your VS Code terminal and run these 3 lines:
bash
git add .github/workflows/CI.yml
git commit -m "Fix workflow: Remove Python bloat"
git push origin main
Use code with caution.

3. Verify
Go back to the Actions tab in GitHub. You should see a new run start. This time, it won't try to build "wheels" or "Python" stuff—it will jump straight to the Build, Tag, and Push steps for AWS.
